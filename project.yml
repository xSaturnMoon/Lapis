name: Lapis
options:
  bundleIdPrefix: com.xsaturnmoon
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Lapis:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Lapis/Menu
      - path: Lapis/Game
      - path: Lapis/LapisApp.swift
      - path: Lapis/Info.plist
      - path: Lapis/Lapis.entitlements
    frameworks:
      - path: Lapis/Frameworks/LibPojav.framework
        embed: true
      - path: Lapis/Frameworks/JRE.framework
        embed: true
      - path: Lapis/Frameworks/MetalAngle.framework
        embed: true
      - path: Lapis/Frameworks/Dobby.framework
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Lapis/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.xsaturnmoon.lapis
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        SWIFT_OBJC_BRIDGING_HEADER: Lapis/Game/Lapis-Bridging-Header.h
        USER_HEADER_SEARCH_PATHS: Lapis/Game
        CLANG_ENABLE_MODULES: "YES"
        ENABLE_BITCODE: "NO"
        FRAMEWORK_SEARCH_PATHS: $(PROJECT_DIR)/Lapis/Frameworks
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Lapis/Frameworks
        OTHER_LDFLAGS:
          - "-ldl"
          - "-lpthread"
          - "-framework"
          - "UIKit"
          - "-framework"
          - "Foundation"
          - "-framework"
          - "LibPojav"
          - "-framework"
          - "JRE"
          - "-framework"
          - "MetalAngle"
          - "-framework"
          - "Dobby"
        OTHER_CFLAGS:
          - "-Wno-unused-function"
          - "-Wno-unused-variable"
    entitlements:
      path: Lapis/Lapis.entitlements