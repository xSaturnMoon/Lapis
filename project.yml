name: Lapis
options:
  bundleIdPrefix: com.xsaturnmoon
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Lapis:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Lapis/Menu
      - path: Lapis/Game
      - path: Lapis/LapisApp.swift
      - path: Lapis/Info.plist
      - path: Lapis/Lapis.entitlements
    frameworks:
      # ── AltJIT / UI ──────────────────────────────
      - path: Lapis/Frameworks/AltKit.framework
        embed: true
      - path: Lapis/Frameworks/CAltKit.framework
        embed: true
      - path: Lapis/Frameworks/UnzipKit.framework
        embed: true
      # ── OpenGL ES / EGL ──────────────────────────
      - path: Lapis/Frameworks/libEGL.framework
        embed: true
      - path: Lapis/Frameworks/libGLESv2.framework
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Lapis/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.xsaturnmoon.lapis
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        SWIFT_OBJC_BRIDGING_HEADER: Lapis/Game/Lapis-Bridging-Header.h
        USER_HEADER_SEARCH_PATHS: Lapis/Game
        CLANG_ENABLE_MODULES: "YES"
        ENABLE_BITCODE: "NO"
        FRAMEWORK_SEARCH_PATHS: $(PROJECT_DIR)/Lapis/Frameworks
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Lapis/Frameworks

        # ── CRITICO: rpath ──────────────────────────────────────────────
        # Senza questi dyld non trova i .dylib a runtime e JNI_CreateJavaVM
        # crasha silenziosamente (nessun log, SIGBUS istantaneo).
        # Servono tutti e tre i livelli: Frameworks, lib/, lib/server/
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/Frameworks"
          - "@executable_path/java_runtimes/java-17-openjdk/lib"
          - "@executable_path/java_runtimes/java-17-openjdk/lib/server"
          - "@executable_path/java_runtimes/java-8-openjdk/lib"
          - "@executable_path/java_runtimes/java-8-openjdk/lib/server"
          - "@executable_path/java_runtimes/java-21-openjdk/lib"
          - "@executable_path/java_runtimes/java-21-openjdk/lib/server"

        OTHER_LDFLAGS:
          - "-ldl"
          - "-lpthread"
          - "-framework"
          - "UIKit"
          - "-framework"
          - "Foundation"
        OTHER_CFLAGS:
          - "-Wno-unused-function"
          - "-Wno-unused-variable"
    entitlements:
      path: Lapis/Lapis.entitlements
      