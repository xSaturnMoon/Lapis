name: Lapis
options:
  bundleIdPrefix: com.xsaturnmoon
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Lapis:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Lapis
    settings:
      base:
        INFOPLIST_FILE: Lapis/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.xsaturnmoon.lapis
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        SWIFT_OBJC_BRIDGING_HEADER: Lapis/Game/Lapis-Bridging-Header.h
        CLANG_ENABLE_MODULES: "YES"
        ENABLE_BITCODE: "NO"
        OTHER_LDFLAGS:
          - "-ldl"
          - "-lpthread"
          - "-framework"
          - "UIKit"
          - "-framework"
          - "Foundation"
        OTHER_CFLAGS:
          - "-Wno-unused-function"
          - "-Wno-unused-variable"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Lapis/Game/external"
          - "$(SRCROOT)/Lapis/Game/external/ANGLE"
    entitlements:
      path: Lapis/Lapis.entitlements