name: Lapis
options:
  bundleIdPrefix: com.xsaturnmoon
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Lapis:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Lapis
    settings:
      base:
        INFOPLIST_FILE: Lapis/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.xsaturnmoon.lapis
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
