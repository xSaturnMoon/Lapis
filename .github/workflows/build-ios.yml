name: Build Lapis IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download JRE for iOS
        run: |
          echo "=== Downloading OpenJDK 17 for iOS ARM64 ==="
          # Download pre-built JRE from PojavLauncher releases
          mkdir -p jre-ios
          curl -L -o jre.tar.gz "https://github.com/nicklasmoeller/openjdk-mobile-targets/releases/download/v17.0.1-jvm-ios-arm64/jre-17.0.1-ios-arm64.tar.gz" || {
            echo "Primary JRE download failed, trying alternative..."
            curl -L -o jre.tar.gz "https://github.com/nicklasmoeller/openjdk-mobile-targets/releases/download/v17.0.1-jvm-ios-arm64/jre-17.0.1+12-ios-aarch64.tar.gz" || {
              echo "WARNING: JRE download failed. Building without JRE bundle."
              echo "The JRE will need to be installed separately on the device."
              touch jre-ios/.no-jre
            }
          }
          if [ -f jre.tar.gz ]; then
            tar xzf jre.tar.gz -C jre-ios/ 2>/dev/null || {
              echo "Extracting with different structure..."
              tar xzf jre.tar.gz
              mv jre*/* jre-ios/ 2>/dev/null || mv java*/* jre-ios/ 2>/dev/null || true
            }
            rm -f jre.tar.gz
          fi
          echo "JRE contents:"
          ls -la jre-ios/ || echo "JRE directory empty"

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          xcodebuild clean build \
            -project Lapis.xcodeproj \
            -scheme Lapis \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA
        run: |
          APP_PATH=$(find ./build -name "Lapis.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Lapis.app not found"
            find ./build -type d -maxdepth 5 || echo "No build dir"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Bundle JRE into the app if available
          if [ -d "jre-ios" ] && [ ! -f "jre-ios/.no-jre" ]; then
            echo "Bundling JRE into app..."
            cp -r jre-ios "$APP_PATH/jre"
            echo "JRE bundled successfully"
          else
            echo "WARNING: No JRE to bundle"
          fi
          
          # Sign entitlements
          if [ -f "Lapis/Lapis.entitlements" ]; then
            ldid -SLapis/Lapis.entitlements "$APP_PATH/Lapis" 2>/dev/null || {
              echo "ldid not found, installing..."
              brew install ldid
              ldid -SLapis/Lapis.entitlements "$APP_PATH/Lapis"
            }
          fi
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Lapis.ipa Payload
          rm -rf Payload
          
          echo "IPA created successfully!"
          ls -la Lapis.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lapis-IPA
          path: Lapis.ipa
          retention-days: 30
