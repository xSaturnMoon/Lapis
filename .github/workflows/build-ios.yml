name: Build Lapis IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen ldid

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          xcodebuild clean build \
            -project Lapis.xcodeproj \
            -scheme Lapis \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA
        run: |
          APP_PATH=$(find ./build -name "Lapis.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Lapis.app not found"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Lapis.ipa Payload
          rm -rf Payload
          
          echo "=== IPA created ==="
          ls -la Lapis.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lapis-IPA
          path: Lapis.ipa
          retention-days: 30
