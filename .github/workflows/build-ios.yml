name: Build Lapis IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen ldid

      - name: Download and Extract Amethyst Engine
        run: |
          curl -L -o amethyst.zip "https://nightly.link/AngelAuraMC/Amethyst-iOS/workflows/development/main/org.angelauramc.amethyst-ios.ipa.zip"
          unzip -q amethyst.zip -d temp_zip
          IPA_FILE=$(find temp_zip -name "*.ipa" | head -1)
          unzip -q "$IPA_FILE" -d temp_ipa
          
          # Creazione della cartella corretta per il linker
          mkdir -p Lapis/Lapis/Frameworks
          
          echo "=== Searching for Frameworks in Downloaded IPA ==="
          # Copia ricorsiva dettagliata
          find temp_ipa -name "*.framework" -type d -exec cp -rv {} Lapis/Lapis/Frameworks/ \;
          
          echo "=== Frameworks Extraction Results ==="
          ls -R Lapis/Lapis/Frameworks/
          du -sh Lapis/Lapis/Frameworks/
          rm -rf temp_zip temp_ipa amethyst.zip

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          xcodebuild clean build \
            -project Lapis.xcodeproj \
            -scheme Lapis \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA
        run: |
          APP_PATH=$(find ./build -name "Lapis.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Lapis.app not found"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # ← CORRETTO: copia manuale dai nuovi percorsi
          echo "=== Manual Embedding Frameworks ==="
          mkdir -p "$APP_PATH/Frameworks"
          cp -rv Lapis/Lapis/Frameworks/* "$APP_PATH/Frameworks/"
          
          # Pseudo-firma tutto con ldid (già installato)
          echo "=== Signing binaries with ldid ==="
          ldid -S "$APP_PATH/Lapis"
          
          # Trova tutti i binari nei framework e sventrali (firma ldid)
          # NOTA: usiamo find per gestire sia .framework che eventuali .dylib
          find "$APP_PATH/Frameworks" -type f \( -perm -u=x -o -name "*.dylib" \) -exec ldid -S {} +
          
          echo "=== Packaging IPA ==="
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Lapis.ipa Payload
          rm -rf Payload
          
          echo "=== Final IPA Status ==="
          ls -lh Lapis.ipa
          unzip -l Lapis.ipa | grep Frameworks | head -10

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lapis-IPA
          path: Lapis.ipa
          retention-days: 30
