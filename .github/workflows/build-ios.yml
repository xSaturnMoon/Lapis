name: Build Lapis IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen ldid

      - name: Download and Extract Amethyst Engine
        run: |
          curl -L -o amethyst.zip "https://nightly.link/AngelAuraMC/Amethyst-iOS/workflows/development/main/org.angelauramc.amethyst-ios.ipa.zip"
          unzip -q amethyst.zip -d temp_zip
          IPA_FILE=$(find temp_zip -name "*.ipa" | head -1)
          unzip -q "$IPA_FILE" -d temp_ipa
          mkdir -p Lapis/Frameworks
          APP_DIR=$(ls temp_ipa/Payload/ | grep ".app" | head -1)
          if [ -d "temp_ipa/Payload/$APP_DIR/Frameworks" ]; then
            cp -r "temp_ipa/Payload/$APP_DIR/Frameworks"/* Lapis/Frameworks/
          fi
          rm -rf temp_zip temp_ipa amethyst.zip
          echo "=== Engine Frameworks Ready in Lapis/Frameworks ==="
          ls -R Lapis/Frameworks/

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          xcodebuild clean build \
            -project Lapis.xcodeproj \
            -scheme Lapis \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA
        run: |
          APP_PATH=$(find ./build -name "Lapis.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Lapis.app not found"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Lapis.ipa Payload
          rm -rf Payload
          
          echo "=== IPA created ==="
          ls -la Lapis.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lapis-IPA
          path: Lapis.ipa
          retention-days: 30
