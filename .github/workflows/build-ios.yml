name: Build Lapis IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen ldid

      - name: Extract Amethyst Engine
        run: |
          echo "=== Downloading Amethyst Engine ==="
          curl -L -o amethyst.zip "https://nightly.link/AngelAuraMC/Amethyst-iOS/workflows/development/main/org.angelauramc.amethyst-ios.ipa.zip"
          unzip -q amethyst.zip -d temp_zip
          IPA_FILE=$(find temp_zip -name "*.ipa" | head -1)
          unzip -q "$IPA_FILE" -d temp_ipa
          
          echo "=== Setting up Lapis Frameworks ==="
          mkdir -p Lapis/Frameworks
          
          # Find Amethyst App path
          AMETHYST_APP=$(find temp_ipa -name "*.app" -type d | head -1)
          echo "Found Amethyst App at: $AMETHYST_APP"
          
          # 1. Total Framework Extraction
          if [ -d "$AMETHYST_APP/Frameworks" ]; then
            cp -av "$AMETHYST_APP/Frameworks/"* Lapis/Frameworks/
          fi
          
          # 2. Total Dylib Extraction (including standalone dylibs in app bundle)
          find "$AMETHYST_APP" -name "*.dylib" -maxdepth 1 -exec cp -av {} Lapis/Frameworks/ \;
          
          # Verify detection
          ls -R Lapis/Frameworks/
          
          echo "=== Done ==="
          # Keep temp_ipa because we need it for the Create IPA step later (to extract runtime)

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          
          xcodebuild clean build \
            -project Lapis.xcodeproj \
            -scheme Lapis \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA
        run: |
          APP_PATH=$(find ./build -name "Lapis.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then exit 1; fi
          
          
          echo "=== Injecting Total Amethyst Engine ==="
          mkdir -p "$APP_PATH/Frameworks"
          # Copy every single component we extracted before
          cp -rf Lapis/Frameworks/* "$APP_PATH/Frameworks/" || true
          
          AMETHYST_APP=$(find temp_ipa -name "*.app" -type d | head -1)
          # Inject JVM Runtimes (Java 17/21)
          if [ -d "$AMETHYST_APP/runtime" ]; then cp -rf "$AMETHYST_APP/runtime" "$APP_PATH/"; fi
          if [ -d "$AMETHYST_APP/java_runtimes" ]; then cp -rf "$AMETHYST_APP/java_runtimes" "$APP_PATH/"; fi
          
          # Inject additional JARs if found (net.kdt.pojavlaunch classes)
          find "$AMETHYST_APP" -name "*.jar" -exec cp -rf {} "$APP_PATH/" \;
          
          echo "=== Deep Signing Engine Components with Entitlements ==="
          # Sign all frameworks and dylibs recursively using the app's entitlements
          find "$APP_PATH/Frameworks" -name "*.framework" -exec codesign --force --deep --sign - --entitlements Lapis/Lapis.entitlements {} \;
          find "$APP_PATH/Frameworks" -name "*.dylib" -exec codesign --force --sign - --entitlements Lapis/Lapis.entitlements {} \;
          
          # Sign the main app bundle with entitlements
          codesign --force --deep --sign - --entitlements Lapis/Lapis.entitlements "$APP_PATH"
          
          # Pack into IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Lapis.ipa Payload
          
          echo "=== Final Status ==="
          ls -lh Lapis.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lapis-iPadOS26-Final
          path: Lapis.ipa
          retention-days: 30
