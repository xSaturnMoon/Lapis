name: Build Lapis IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen ldid

      - name: Extract Amethyst Engine
        run: |
          echo "=== Downloading Amethyst Engine ==="
          curl -L -o amethyst.zip "https://nightly.link/AngelAuraMC/Amethyst-iOS/workflows/development/main/org.angelauramc.amethyst-ios.ipa.zip"
          unzip -q amethyst.zip -d temp_zip
          IPA_FILE=$(find temp_zip -name "*.ipa" | head -1)
          unzip -q "$IPA_FILE" -d temp_ipa
          
          echo "=== Setting up Lapis Frameworks ==="
          mkdir -p Lapis/Frameworks
          # Search and copy the new Amethyst frameworks
          find temp_ipa -name "AltKit.framework" -type d -exec cp -av {} Lapis/Frameworks/ \;
          find temp_ipa -name "CAltKit.framework" -type d -exec cp -av {} Lapis/Frameworks/ \;
          find temp_ipa -name "UnzipKit.framework" -type d -exec cp -av {} Lapis/Frameworks/ \;
          find temp_ipa -name "libEGL.framework" -type d -exec cp -av {} Lapis/Frameworks/ \;
          find temp_ipa -name "libGLESv2.framework" -type d -exec cp -av {} Lapis/Frameworks/ \;
          
          # Verify detection
          ls -R Lapis/Frameworks/
          
          echo "=== SYMBOL DISCOVERY (Find entry point) ==="
          # Search for likely entry point symbols in the new frameworks
          find Lapis/Frameworks -name "libEGL.framework" -exec nm -gU {}/libEGL \; || true
          find Lapis/Frameworks -name "libGLESv2.framework" -exec nm -gU {}/libGLESv2 \; || true
          
          echo "=== Done ==="
          # Keep temp_ipa because we need it for the Create IPA step later (to extract runtime)

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          
          xcodebuild clean build \
            -project Lapis.xcodeproj \
            -scheme Lapis \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA
        run: |
          APP_PATH=$(find ./build -name "Lapis.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then exit 1; fi
          
          echo "=== 1. Manual Embedding Frameworks ==="
          mkdir -p "$APP_PATH/Frameworks"
          # Copiamo solo il contenuto dei framework, evitando directory di firma vecchie se possibile
          find Lapis/Frameworks -name "*.framework" -type d -exec cp -av {} "$APP_PATH/Frameworks/" \;
          
          echo "=== 2. Searching and Injecting JRE/Runtime from Amethyst ==="
          # Amethyst spesso mette la JRE in 'runtime' o 'java_runtimes'
          AMETHYST_APP=$(find temp_ipa -name "*.app" -type d | head -1)
          if [ -d "$AMETHYST_APP/runtime" ]; then
            cp -av "$AMETHYST_APP/runtime" "$APP_PATH/"
            echo "Injected 'runtime' folder"
          fi
          if [ -d "$AMETHYST_APP/java_runtimes" ]; then
            cp -av "$AMETHYST_APP/java_runtimes" "$APP_PATH/"
            echo "Injected 'java_runtimes' folder"
          fi
          
          echo "=== 3. Ad-hoc Signing with codesign (more robust than ldid) ==="
          # Firmiamo prima i framework
          find "$APP_PATH/Frameworks" -name "*.framework" -type d -exec codesign --force --deep --sign - {} \;
          # Poi il binario principale
          codesign --force --deep --sign - "$APP_PATH/Lapis"
          
          echo "=== 4. Packaging IPA ==="
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Lapis.ipa Payload
          rm -rf Payload
          
          echo "=== Final Status ==="
          ls -lh Lapis.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lapis-IPA
          path: Lapis.ipa
          retention-days: 30
