name: Build Lapis IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen ldid

      - name: Download and Extract PojavLauncher Engine
        run: |
          echo "=== Downloading Latest PojavLauncher Official Engine ==="
          # Get the latest release data from API
          RELEASE_DATA=$(curl -s https://api.github.com/repos/PojavLauncherTeam/PojavLauncher_iOS/releases/latest)
          # Exact IPA download URL
          IPA_URL=$(echo "$RELEASE_DATA" | grep "browser_download_url" | grep ".ipa" | head -1 | cut -d '"' -f 4)
          
          if [ -z "$IPA_URL" ]; then
            echo "ERROR: Could not find .ipa asset. Checking all assets..."
            IPA_URL=$(echo "$RELEASE_DATA" | grep "browser_download_url" | head -1 | cut -d '"' -f 4)
          fi
          
          echo "Downloading from: $IPA_URL"
          curl -L -o pojav.ipa "$IPA_URL"
          
          echo "=== Extracting Frameworks ==="
          mkdir -p temp_ipa
          unzip -q pojav.ipa -d temp_ipa || { echo "ERROR: Failed to unzip pojav.ipa"; ls -la pojav.ipa; exit 1; }
          
          # Path to frameworks in Pojav IPA: Payload/PojavLauncher.app/Frameworks
          mkdir -p Lapis/Game/Native
          APP_DIR=$(ls temp_ipa/Payload/ | grep ".app" | head -1)
          
          if [ -d "temp_ipa/Payload/$APP_DIR/Frameworks" ]; then
            echo "Copying frameworks from $APP_DIR..."
            cp -r "temp_ipa/Payload/$APP_DIR/Frameworks"/* Lapis/Game/Native/
          else
            echo "WARNING: Frameworks directory not found in IPA. Checking main app directory..."
            # fallback: copy everything that might be a framework
            find temp_ipa/Payload/$APP_DIR -name "*.framework" -exec cp -r {} Lapis/Game/Native/ \; 2>/dev/null || true
          fi
          
          # Clean up
          rm -rf temp_ipa pojav.ipa
          echo "=== Engine Frameworks Ready in Lapis/Game/Native ==="
          ls -la Lapis/Game/Native/

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          xcodebuild clean build \
            -project Lapis.xcodeproj \
            -scheme Lapis \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA
        run: |
          APP_PATH=$(find ./build -name "Lapis.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Lapis.app not found"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Lapis.ipa Payload
          rm -rf Payload
          
          echo "=== IPA created ==="
          ls -la Lapis.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lapis-IPA
          path: Lapis.ipa
          retention-days: 30
