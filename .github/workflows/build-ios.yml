name: Build Lapis IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen ldid

      - name: Inspect Amethyst Structure
        run: |
          echo "=== Downloading Amethyst IPA ==="
          curl -L -o amethyst.zip "https://nightly.link/AngelAuraMC/Amethyst-iOS/workflows/development/main/org.angelauramc.amethyst-ios.ipa.zip"
          unzip -q amethyst.zip -d temp_zip
          IPA_FILE=$(find temp_zip -name "*.ipa" | head -1)
          echo "Found IPA: $IPA_FILE"
          unzip -q "$IPA_FILE" -d temp_ipa
          
          echo "=== FULL DIRECTORY STRUCTURE (Top 100 files) ==="
          find temp_ipa -maxdepth 5 | head -n 100
          
          echo "=== CONTENTS OF .app FOLDER ==="
          APP_PATH=$(find temp_ipa -name "*.app" -type d | head -1)
          ls -R "$APP_PATH"
          
          echo "=== SEARCHING FOR EXECUTABLE AND NATIVES ==="
          find "$APP_PATH" -maxdepth 2 -not -path '*/.*'
          
          # Don't fail the build yet, just collect info
          mkdir -p Lapis/Frameworks
          find temp_ipa -name "*.framework" -type d -exec cp -av {} Lapis/Frameworks/ \; || true

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          echo "Verifying Frameworks Path..."
          ls -d "$GITHUB_WORKSPACE/Lapis/Frameworks/LibPojav.framework" || (echo "ERROR: NOT FOUND!" && exit 1)
          
          xcodebuild clean build \
            -project Lapis.xcodeproj \
            -scheme Lapis \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA
        run: |
          APP_PATH=$(find ./build -name "Lapis.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then exit 1; fi
          
          echo "=== Manual Embedding Frameworks ==="
          mkdir -p "$APP_PATH/Frameworks"
          cp -rv "$GITHUB_WORKSPACE/Lapis/Frameworks/"* "$APP_PATH/Frameworks/"
          
          echo "=== Signing with ldid ==="
          ldid -S "$APP_PATH/Lapis"
          # NOTA: usiamo find per gestire sia .framework che eventuali .dylib
          find "$APP_PATH/Frameworks" -type f \( -perm -u=x -o -name "*.dylib" \) -exec ldid -S {} +
          
          echo "=== Packaging IPA ==="
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Lapis.ipa Payload
          rm -rf Payload
          
          echo "=== Final IPA Status ==="
          ls -lh Lapis.ipa
          unzip -l Lapis.ipa | grep Frameworks | head -10

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Lapis-IPA
          path: Lapis.ipa
          retention-days: 30
