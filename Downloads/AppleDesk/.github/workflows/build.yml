name: Build AppleDesk IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project AppleDesk.xcodeproj \
            -scheme AppleDesk \
            -configuration Release \
            -archivePath build/AppleDesk.xcarchive \
            -destination 'generic/platform=iOS' \
            PRODUCT_BUNDLE_IDENTIFIER=com.appledesk.app \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            SWIFT_COMPILATION_MODE=singlefile

      - name: Package IPA
        run: |
          APP_PATH=$(find build/AppleDesk.xcarchive -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "ERRORE: App non trovata!"; exit 1; fi
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AppleDesk.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AppleDesk-IPA
          path: AppleDesk.ipa
          retention-days: 14
